<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Literary Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5f4ef" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d1b2a" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-title" content="Literary Clock">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; child-src 'self'">
  <meta name="description" content="A unique digital clock that tells the time using thousands of quotes from classic literature. Experience the passing moments through the words of great authors.">
  <link rel="icon" href="favicon.ico" type="image/x-icon" sizes="any">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="clock-container">
    <div id="clock-content" class="clock-content fading">
      <p id="quote" class="quote-text"></p>
      <div class="attribution">
        <div id="book-container"></div>
        <p id="author" class="author-credit"></p>
      </div>
    </div>
    <div id="info-panel" class="info-panel" hidden>
      <p class="info-text">Literary Clock &mdash; a collection of time&hyphen;tagged quotes from world literature.</p>
      <p class="info-text"><a href="https://bythegram.ca/blog/angular-literary-clock" target="_blank" rel="noopener noreferrer">About this project</a></p>
    </div>
  </main>
  <footer class="nav-bar">
    <nav class="mode-nav" aria-label="Display mode">
      <button class="mode-btn active" data-mode="clock" aria-pressed="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9.5"/>
          <path d="M12 7.5V12l2.5 1.5"/>
          <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <span class="nav-label">Clock</span>
      </button>
      <button class="mode-btn" data-mode="day" aria-pressed="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="17" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <path d="M10 13h4l-2.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="nav-label">Week</span>
      </button>
      <button class="mode-btn" data-mode="date" aria-pressed="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="17" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <rect x="6.5" y="12" width="2" height="2" rx="0.4" fill="currentColor" stroke="none"/>
          <rect x="11" y="12" width="2" height="2" rx="0.4" fill="currentColor" stroke="none"/>
          <rect x="15.5" y="12" width="2" height="2" rx="0.4" fill="currentColor" stroke="none"/>
          <rect x="6.5" y="15.5" width="2" height="2" rx="0.4" fill="currentColor" stroke="none"/>
          <rect x="11" y="15.5" width="2" height="2" rx="0.4" fill="currentColor" stroke="none"/>
          <rect x="15.5" y="15.5" width="2" height="2" rx="0.4" fill="currentColor" stroke="none"/>
        </svg>
        <span class="nav-label">Date</span>
      </button>
      <button class="mode-btn" data-mode="month" aria-pressed="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="17" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <rect x="6" y="12" width="3" height="2.5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <rect x="10.5" y="12" width="3" height="2.5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <rect x="15" y="12" width="3" height="2.5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <rect x="6" y="15.5" width="3" height="2.5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <rect x="10.5" y="15.5" width="3" height="2.5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <rect x="15" y="15.5" width="3" height="2.5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span class="nav-label">Month</span>
      </button>
      <button class="mode-btn" data-mode="info" aria-pressed="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9.5"/>
          <line x1="12" y1="11" x2="12" y2="17"/>
          <circle cx="12" cy="7.5" r="0.75" fill="currentColor" stroke="none"/>
        </svg>
        <span class="nav-label">Info</span>
      </button>
    </nav>
  </footer>
  <script src="temporal-loader.js"></script>
  <script src="app.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
