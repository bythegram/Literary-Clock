<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Literary Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-title" content="Literary Clock">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; child-src 'self'">
  <link rel="icon" href="favicon.ico" type="image/x-icon" sizes="any">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="clock-container">
    <div id="clock-content" class="clock-content fading">
      <p id="quote" class="quote-text"></p>
      <p class="attribution"><strong id="book"></strong><br><em id="author"></em></p>
    </div>
    <div id="info-panel" class="info-panel" hidden>
      <p class="info-text">Literary Clock &mdash; a collection of time&hyphen;tagged quotes from world literature.</p>
      <p class="info-text"><a href="https://bythegram.ca/blog/angular-literary-clock" target="_blank" rel="noopener noreferrer">About this project</a></p>
    </div>
  </main>
  <footer class="nav-bar">
    <nav class="mode-nav" aria-label="Display mode">
      <button class="mode-btn active" data-mode="clock" aria-pressed="true">Clock</button>
      <button class="mode-btn" data-mode="day" aria-pressed="false">Day of Week</button>
      <button class="mode-btn" data-mode="date" aria-pressed="false">Date</button>
      <button class="mode-btn" data-mode="month" aria-pressed="false">Month</button>
      <button class="mode-btn" data-mode="info" aria-pressed="false">Info</button>
    </nav>
  </footer>
  <script src="app.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
