<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Literary Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-title" content="Literary Clock">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      document.documentElement.setAttribute('data-theme', mq.matches ? 'dark' : 'light');
      if (mq.addEventListener) {
        mq.addEventListener('change', function (e) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
        });
      } else {
        mq.addListener(function (e) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
        });
      }
    }());
  </script>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="clock-container">
    <div class="clock-content">
      <p id="quote" class="quote-text"></p>
      <p class="attribution"><strong id="book"></strong><br><em id="author"></em></p>
    </div>
  </main>
  <footer class="credit">
    <a href="https://bythegram.ca/blog/angular-literary-clock" target="_blank" rel="noopener noreferrer">Credit</a>
  </footer>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function (err) {
        console.error('Service worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
