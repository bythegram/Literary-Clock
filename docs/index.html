<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Literary Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-title" content="Literary Clock">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'">
  <link rel="icon" href="favicon.ico" type="image/x-icon" sizes="any">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="clock-container">
    <div id="clock-content" class="clock-content fading">
      <p id="quote" class="quote-text"></p>
      <p class="attribution"><strong id="book"></strong><br><em id="author"></em></p>
    </div>
  </main>
  <footer class="credit">
    <a href="https://bythegram.ca/blog/angular-literary-clock" target="_blank" rel="noopener noreferrer">Credit</a>
  </footer>
  <script src="app.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
