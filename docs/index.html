<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Literary Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LitClock">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      document.documentElement.setAttribute('data-bs-theme', mq.matches ? 'dark' : 'light');
      if (mq.addEventListener) {
        mq.addEventListener('change', function (e) {
          document.documentElement.setAttribute('data-bs-theme', e.matches ? 'dark' : 'light');
        });
      } else {
        mq.addListener(function (e) {
          document.documentElement.setAttribute('data-bs-theme', e.matches ? 'dark' : 'light');
        });
      }
    }());
  </script>
  <link rel="stylesheet" href="bootstrap.min.css">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container-fluid">
    <div class="row justify-content-center align-items-center">
      <div class="col-auto max-100">
        <p id="quote" class="text-uppercase quote-text"></p>
        <p class="text-end"><strong id="book"></strong><br><em id="author"></em></p>
      </div>
      <div class="col-12 align-self-end fixed-bottom">
        <a href="https://bythegram.ca/blog/angular-literary-clock" target="_blank">Credit</a>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function (err) {
        console.error('Service worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
